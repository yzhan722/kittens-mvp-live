name: selfcheck

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend selfcheck
        run: node scripts/selfcheck.mjs
      - name: API contract selfcheck
        run: node scripts/api-contract-selfcheck.mjs
      - name: Items selfcheck
        run: node scripts/items-selfcheck.mjs
      - name: Analytics selfcheck
        run: node scripts/analytics-selfcheck.mjs
      - name: Daily tasks selfcheck
        run: node scripts/daily_tasks-selfcheck.mjs
      - name: Era selfcheck
        run: node scripts/era-selfcheck.mjs
      - name: Gameplay fun selfcheck
        run: node scripts/gameplay-fun-selfcheck.mjs
      - name: Migrations selfcheck
        run: node scripts/migrations-selfcheck.mjs
      - name: Install deps
        run: npm ci
      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps
      - name: Playwright smoke
        run: node scripts/playwright-smoke.mjs
      - name: Player sim (6h)
        run: node scripts/player-sim.mjs
        env:
          SIM_HOURS: "6"
          SIM_DT: "30"
      - name: E2E smoke
        run: node scripts/e2e-smoke.mjs
