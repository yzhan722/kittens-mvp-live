name: selfcheck

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Frontend selfcheck
        run: node scripts/selfcheck.mjs
      - name: API contract selfcheck
        run: node scripts/api-contract-selfcheck.mjs
